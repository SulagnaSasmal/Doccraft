name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint and build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Prevent Next.js from erroring on missing env vars during CI build.
          # API routes are not called during static analysis — only Vercel needs
          # the real keys at runtime.
          OPENAI_API_KEY: placeholder-for-ci
          NEXT_PUBLIC_APP_URL: http://localhost:3000
